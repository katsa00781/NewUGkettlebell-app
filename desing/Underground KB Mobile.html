<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<title>Underground KB Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Manrope', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { overflow: hidden; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  /* hide scrollbars inside phone screens */
  .phone-scroll::-webkit-scrollbar { display: none; }
  .phone-scroll { scrollbar-width: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel" data-presets="react">
const PHONE_W = 360;
const PHONE_H = 760;

// Phone bezel — minimal dark bezel since the app is dark mode.
function Phone({ children, focus }) {
  return (
    <div style={{
      width: PHONE_W, height: PHONE_H,
      borderRadius: 38, position: 'relative', overflow: 'hidden',
      background: '#0f172a',
      boxShadow: focus
        ? 'none'
        : '0 30px 60px -20px rgba(15,23,42,0.55), 0 0 0 1px rgba(15,23,42,0.18)',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)',
        width: 108, height: 30, borderRadius: 22, background: '#000', zIndex: 80,
      }} />
      <div className="phone-scroll" style={{ position: 'absolute', inset: 0 }}>
        {children}
      </div>
    </div>
  );
}

function Screen({ route }) {
  return <Phone><App initialRoute={route} /></Phone>;
}

function Root() {
  return (
    <DesignCanvas>
      <DCSection
        id="prototype"
        title="Underground KB Mobile"
        subtitle="Companion app · dark mode · interaktív prototyp · kattints és próbáld ki"
      >
        <DCArtboard id="interactive" label="Interaktív · indul Dashboard-on" width={PHONE_W} height={PHONE_H}>
          <Screen route="dashboard" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="screens"
        title="Képernyők"
        subtitle="Mind a 5 fő nézet egymás mellett — minden artboard önállóan navigálható"
      >
        <DCArtboard id="s-dashboard" label="01 · Dashboard" width={PHONE_W} height={PHONE_H}>
          <Screen route="dashboard" />
        </DCArtboard>
        <DCArtboard id="s-measure" label="02 · Mérések" width={PHONE_W} height={PHONE_H}>
          <Screen route="measure" />
        </DCArtboard>
        <DCArtboard id="s-bodycomp" label="03 · Testkompo mérés (form)" width={PHONE_W} height={PHONE_H}>
          <Screen route="bodycomp" />
        </DCArtboard>
        <DCArtboard id="s-progress" label="04 · Fejlődés" width={PHONE_W} height={PHONE_H}>
          <Screen route="progress" />
        </DCArtboard>
        <DCArtboard id="s-active" label="05 · Aktív edzés logger" width={PHONE_W} height={PHONE_H}>
          <Screen route="active" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="extras"
        title="Extrák"
        subtitle="További nézetek a rendszer teljességéhez"
      >
        <DCArtboard id="s-workouts" label="Edzések · heti terv" width={PHONE_W} height={PHONE_H}>
          <Screen route="workouts" />
        </DCArtboard>
        <DCArtboard id="s-profile" label="Profil" width={PHONE_W} height={PHONE_H}>
          <Screen route="profile" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
